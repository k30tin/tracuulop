<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA CỨU THÔNG TIN LỚP HỌC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 600px; 
        }
        h2 { 
            text-align: center; 
            color: #0056b3; 
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle { 
            text-align: center; 
            color: #d9534f; 
            font-size: 15px; 
            font-weight: bold;
            font-style: italic;
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        button:hover { 
            background-color: #218838; 
        }
        .result-item { 
            background: #e9ecef; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            border-left: 5px solid #28a745; 
            line-height: 1.6; 
            word-wrap: break-word;
        }
        .not-found { 
            text-align: center; 
            color: #dc3545; 
            font-weight: bold; 
            background: #ffe6e6;
            padding: 10px;
            border-radius: 4px;
        }
        .warning-class {
            text-align: center; 
            color: #856404; 
            font-weight: bold; 
            background: #fff3cd;
            padding: 10px;
            border-radius: 4px;
        }
        #searchSection {
            display: none;
        }
        #loading {
            text-align: center;
            color: #0056b3;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TRA CỨU THÔNG TIN LỚP 10</h2>
    <div class="subtitle">(Mời bạn nhập Số báo danh hoặc Họ Tên để tìm kiếm)</div>
    
    <div id="loading">Đang tải dữ liệu, vui lòng đợi...</div>

    <div id="searchSection">
        <input type="text" id="searchInput" placeholder="Ví dụ: 1001 hoặc Nguyễn Văn A" onkeypress="handleKeyPress(event)">
        <button onclick="searchStudent()">Tra Cứu</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    let studentsData = [];

    async function loadExcelData() {
        try {
            const response = await fetch('bang_2.xlsx');
            if (!response.ok) throw new Error("Không tìm thấy file bang_2.xlsx");

            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            studentsData = XLSX.utils.sheet_to_json(worksheet, {defval: "", raw: false});
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('searchSection').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = '<span style="color:red;">Lỗi tải dữ liệu. Hãy kiểm tra lại file Excel trên hệ thống.</span>';
        }
    }

    loadExcelData();

    function removeAccents(str) {
        if (!str) return "";
        return str.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function searchStudent() {
        const input = document.getElementById('searchInput').value.trim();
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = ''; 

        if (input === '') {
            resultDiv.innerHTML = '<div class="not-found">Bạn chưa nhập thông tin. Mời bạn nhập lại!</div>';
            return;
        }

        const normalizedInput = removeAccents(input);
        const isNumber = /^\d+$/.test(input); 
        
        // Nhận diện nếu học sinh nhập định dạng lớp (VD: 10A1, 11B2, 12a3...)
        const isClassFormat = /^\d{2}[a-zA-Z]\d*$/.test(input.replace(/\s/g, ''));

        if (isClassFormat) {
            resultDiv.innerHTML = '<div class="warning-class">Hệ thống không hỗ trợ tra cứu theo danh sách lớp. Mời bạn nhập chính xác SBD hoặc Họ Tên!</div>';
            return;
        }

        // Lọc dữ liệu: Khớp nguyên vẹn (100%)
        const filtered = studentsData.filter(student => {
            let isMatch = false;
            
            for (const [key, value] of Object.entries(student)) {
                const keyLower = key.toLowerCase();
                const valStr = value.toString().trim();

                if (isNumber) {
                    if (keyLower.includes('sbd') || keyLower.includes('báo danh')) {
                        if (valStr === input) isMatch = true;
                    }
                } else {
                    if (keyLower.includes('tên') || keyLower.includes('ten')) {
                        if (removeAccents(valStr) === normalizedInput) isMatch = true;
                    }
                }
            }
            return isMatch;
        });

        if (filtered.length > 0) {
            filtered.forEach(student => {
                let htmlContent = '<div class="result-item">';
                for (const [key, value] of Object.entries(student)) {
                    if (value.toString().trim() !== "") {
                        htmlContent += `<strong>${key}:</strong> ${value} <br>`;
                    }
                }
                htmlContent += '</div>';
                resultDiv.innerHTML += htmlContent;
            });
        } else {
            if (isNumber) {
                resultDiv.innerHTML = '<div class="not-found">SBD KHÔNG TỒN TẠI. Mời bạn kiểm tra và nhập lại!</div>';
            } else {
                resultDiv.innerHTML = '<div class="not-found">Không tìm thấy tên trong danh sách. Mời bạn kiểm tra và nhập lại tên đầy đủ (nguyên vẹn)!</div>';
            }
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            searchStudent();
        }
    }
</script>

</body>
</html>
