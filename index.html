<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Thông Tin Học Sinh</title>
    <!-- Nhúng thư viện SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 600px; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 5px;
        }
        .subtitle { 
            text-align: center; 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 15px; 
        }
        button:hover { 
            background-color: #218838; 
        }
        .result-item { 
            background: #e9ecef; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            border-left: 5px solid #28a745; 
            line-height: 1.6; 
            word-wrap: break-word;
        }
        .not-found { 
            text-align: center; 
            color: #dc3545; 
            font-weight: bold; 
        }
        #searchSection {
            display: none;
        }
        #loading {
            text-align: center;
            color: #0056b3;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tra Cứu Thông Tin</h2>
    <div class="subtitle">Nhập bất kỳ thông tin nào để tìm kiếm</div>
    
    <div id="loading">Đang tải cấu trúc dữ liệu mới, vui lòng đợi...</div>

    <div id="searchSection">
        <!-- Đã đổi placeholder để phù hợp với việc tìm kiếm đa năng -->
        <input type="text" id="searchInput" placeholder="Ví dụ: SBD, tên, hoặc thông tin bất kỳ..." onkeypress="handleKeyPress(event)">
        <button onclick="searchStudent()">Tra Cứu</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    let studentsData = [];

    // Tự động tải file bang_2.xlsx
    async function loadExcelData() {
        try {
            // Cập nhật tên file cần đọc
            const response = await fetch('bang_2.xlsx');
            
            if (!response.ok) {
                throw new Error("Không tìm thấy file bang_2.xlsx");
            }

            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // defval: "" giúp đọc cả những ô trống, không làm lệch cấu trúc
            studentsData = XLSX.utils.sheet_to_json(worksheet, {defval: "", raw: false});
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('searchSection').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = '<span style="color:red;">Lỗi tải dữ liệu. Thầy nhớ kiểm tra lại đã upload file bang_2.xlsx lên GitHub chưa nhé.</span>';
        }
    }

    loadExcelData();

    function removeAccents(str) {
        if (!str) return "";
        return str.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function searchStudent() {
        const input = document.getElementById('searchInput').value.trim();
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = ''; 

        if (input === '') {
            resultDiv.innerHTML = '<div class="not-found">Vui lòng nhập thông tin!</div>';
            return;
        }

        const normalizedInput = removeAccents(input);

        // Thuật toán quét toàn bộ các cột (keys) trong object thay vì fix cứng tên cột
        const filtered = studentsData.filter(student => {
            return Object.values(student).some(val => 
                removeAccents(val).includes(normalizedInput)
            );
        });

        if (filtered.length > 0) {
            filtered.forEach(student => {
                let htmlContent = '<div class="result-item">';
                
                // Duyệt qua tất cả các cặp Khóa (Tên cột) - Giá trị (Dữ liệu ô)
                for (const [key, value] of Object.entries(student)) {
                    // Bỏ qua nếu giá trị rỗng để giao diện gọn gàng hơn
                    if (value.toString().trim() !== "") {
                        htmlContent += `<strong>${key}:</strong> ${value} <br>`;
                    }
                }
                
                htmlContent += '</div>';
                resultDiv.innerHTML += htmlContent;
            });
        } else {
            resultDiv.innerHTML = '<div class="not-found">Không tìm thấy dữ liệu phù hợp.</div>';
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            searchStudent();
        }
    }
</script>

</body>
</html>
